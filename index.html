<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K1NJ Games</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    color:white;
    background:url("https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?auto=format&fit=crop&w=1920&q=80") center/cover fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:-1;
}

header{
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(10px);
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
}

h1{
    margin:10px;
}

#search{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:10px;
}

#games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(0,0,0,.6);
    border-radius:15px;
    overflow:hidden;
    text-decoration:none;
    color:white;
    transition:.2s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card p{
    text-align:center;
    padding:10px;
    margin:0;
    font-weight:bold;
}

#fs{
    position:fixed;
    right:15px;
    bottom:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>🎮 K1NJ GAMES 🎮</h1>
    <input id="search" placeholder="Search games...">
</header>

<div id="games">

<a class="card" href="games/flip-bros/" target="_blank">
    <img src="flip-bros.png">
    <p>Flip Bros</p>
</a>

<a class="card" href="games/dye-hard/" target="_blank">
    <img src="DyeHardTeaser.jpg">
    <p>Dye Hard</p>
</a>

<a class="card" href="games/moto-x3m/" target="_blank">
    <img src="moto-x3m-2.jpg">
    <p>Moto X3M</p>
</a>

</div>

<button id="fs" onclick="toggleFS()">⛶ Fullscreen</button>

<script>
const search=document.getElementById("search");

search.addEventListener("input",()=>{
    let value=search.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card=>{
        let name=card.innerText.toLowerCase();

        card.style.display=
            name.includes(value)
            ? "block"
            : "none";
    });
});

function toggleFS(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
