<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K1NJ Games</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:url("https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?auto=format&fit=crop&w=1920&q=80") center/cover fixed;
}

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* header */
header{
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

h1{
  margin:10px 0;
}

/* search */
input{
  width:90%;
  max-width:500px;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  margin-top:10px;
}

/* categories */
#cats{
  margin-top:10px;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* grid */
#games{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

/* cards */
.card{
  background:rgba(0,0,0,0.6);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card p{
  margin:10px;
  text-align:center;
}

/* fullscreen button */
#fs{
  position:fixed;
  bottom:15px;
  right:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
}
</style>
</head>

<body>

<header>
  <h1>🎮 K1NJ GAMES 🎮</h1>

  <input id="search" placeholder="Search games...">

  <div id="cats">
    <button onclick="filter('All')">All</button>
    <button onclick="filter('Action')">Action</button>
    <button onclick="filter('Racing')">Racing</button>
    <button onclick="filter('Shooter')">Shooter</button>
    <button onclick="filter('Puzzle')">Puzzle</button>
    <button onclick="filter('Adventure')">Adventure</button>
    <button onclick="filter('Sports')">Sports</button>
  </div>
</header>

<div id="games"></div>

<button id="fs" onclick="toggleFS()">⛶ Fullscreen</button>

<script>
// generate 200 games automatically
let games = [];
let cats = ["Action","Racing","Shooter","Puzzle","Adventure","Sports"];

for(let i=1;i<=200;i++){
  games.push({
    name:"Game "+i,
    cat:cats[i % cats.length],
    img:"https://picsum.photos/300/200?random="+i
  });
}

function render(list){
  let box = document.getElementById("games");
  box.innerHTML="";
  list.forEach(g=>{
    box.innerHTML += `
      <div class="card" data-cat="${g.cat}">
        <img src="${g.img}">
        <p>${g.name}</p>
      </div>
    `;
  });
}

render(games);

// search
document.getElementById("search").addEventListener("input", e=>{
  let v = e.target.value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(v)));
});

// filter
function filter(c){
  if(c==="All") return render(games);
  render(games.filter(g=>g.cat===c));
}

// fullscreen
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
